<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page {
        size: legal portrait;
        margin: 12mm 10mm 12mm 10mm;
      }

      body {
        margin: 0;
        color: #111;
        font-family: "Times New Roman", "Noto Sans Devanagari", serif;
        font-size: 13px;
        line-height: 1.4;
      }

      {{fontFaceStyles}}

      .answer-key {
        font-size: 13px;
      }

      .answer-key h2 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .answer-key ol {
        margin: 0;
        padding-left: 20px;
        columns: 2;
        column-gap: 16px;
      }

      .answer-key li {
        break-inside: avoid;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <section class="answer-key">
      <h2>Answer Key</h2>
      <ol>
        {{answers}}
      </ol>
    </section>
  </body>
</html>
